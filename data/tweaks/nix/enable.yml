---
# ansible playbook to install Nix
#
# btrfs root  -> dedicated, compressed /nix subvolume (+ fstab entry)
# anything else -> let the Determinate installer create /nix on root directly

- name: Execute the Determinate Systems Nix installer
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  tasks:
      - name: Get filesystem type of the root mount
        ansible.builtin.command:
          cmd: findmnt -no FSTYPE --target /
        register: root_fstype
        changed_when: false

      # Everything in here is btrfs-only. On other filesystems we skip
      # straight to the installer, which will make /nix on root itself.
      - name: Set up a dedicated /nix btrfs subvolume
        when: root_fstype.stdout == 'btrfs'
        block:
            # mountpoint -q returns 0 only when /nix is already a mountpoint;
            # anything else (incl. exists-but-unmounted) means we still need to
            # create and mount the subvolume.
            - name: Check whether /nix is already mounted
              ansible.builtin.command:
                cmd: mountpoint -q /nix
              register: nix_mountpoint
              changed_when: false
              failed_when: false

            # ultramarine bootc comes with a nix.mount unit pre-configured, and we use it to avoid creating a duplicate subvolume
            - name: Check whether nix.mount already exists
              ansible.builtin.command:
                cmd: systemctl list-unit-files nix.mount --no-legend --no-pager
              register: nix_mount_unit
              changed_when: false
              failed_when: false

            - name: Start and enable existing nix.mount unit
              ansible.builtin.systemd_service:
                  name: nix.mount
                  state: started
                  enabled: "{{ true if ' static' not in nix_mount_unit.stdout else omit }}"
              when: nix_mount_unit.stdout != ''

            - name: Get the btrfs filesystem UUID
              ansible.builtin.shell:
                cmd: |
                  set -euo pipefail
                  btrfs filesystem show / | awk -F'uuid: ' '/uuid:/ {print $2; exit}'
              register: btrfs_uuid
              changed_when: false
              when:
                  - nix_mountpoint.rc != 0
                  - nix_mount_unit.stdout == ''

            - name: Create Nix btrfs subvolume
              community.general.btrfs_subvolume:
                  name: /nix
                  filesystem_uuid: "{{ btrfs_uuid.stdout }}"
                  automount: true
              when:
                  - nix_mountpoint.rc != 0
                  - nix_mount_unit.stdout == ''

            - name: Ensure /nix exists for subvol mount path
              ansible.builtin.file:
                  path: /nix
                  state: directory
                  owner: root
                  group: root
              when:
                  - nix_mountpoint.rc != 0
                  - nix_mount_unit.stdout == ''

            # We mount ephemerally first to make sure we fail if this doesn't work
            # instead of cursing /etc/fstab to a failed state
            - name: Mount /nix
              ansible.builtin.shell:
                cmd: mount -o "subvol=nix,noatime,compress=zstd:7" UUID={{ btrfs_uuid.stdout }} /nix
              when:
                  - nix_mountpoint.rc != 0
                  - nix_mount_unit.stdout == ''

            # In a just world, state: mounted in the below task would do the above task.
            # Our world is not just. Our world is not kind. ansible.posix.mount
            # does not have any idea what a subvol is and will try (and fail)
            # to unmount root.
            - name: Add Nix subvolume to /etc/fstab
              ansible.posix.mount:
                  src: "UUID={{ btrfs_uuid.stdout }}"
                  path: /nix
                  fstype: btrfs
                  opts: subvol=nix,noatime,compress=zstd:7
                  state: present
              when:
                  - nix_mountpoint.rc != 0
                  - nix_mount_unit.stdout == ''

      - name: Ensure path in /tmp for storing installer
        ansible.builtin.file:
            path: /tmp/nix-installer-tweak/
            state: directory
            owner: root
            group: root

      - name: Get Determinate Systems Nix installer
        ansible.builtin.get_url:
            # explicit filename: a directory dest would land this as
            # /tmp/nix-installer-tweak/nix and break the execute task below
            dest: /tmp/nix-installer-tweak/nix-installer.sh
            url: https://install.determinate.systems/nix
            mode: "0755"

      # The Determinate installer writes /nix/receipt.json on success and bails
      # if run again over an existing install. Skip it if that receipt is there.
      - name: Check whether Nix is already installed
        ansible.builtin.stat:
            path: /nix/receipt.json
        register: nix_receipt

      - name: Execute Installer
        ansible.builtin.shell:
            cmd: /tmp/nix-installer-tweak/nix-installer.sh install --no-confirm
        when: not nix_receipt.stat.exists

      - name: Cleanup
        ansible.builtin.file:
          name: /tmp/nix-installer-tweak
          state: absent
